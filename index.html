<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>معرض أعمال مرتضى</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0d1117] text-white">
  <div class="container mx-auto max-w-6xl p-4">
    <div class="text-center py-10">
      <h1 class="text-4xl font-bold text-blue-400 mb-2">معرض أعمالي</h1>
      <p class="text-gray-400">مشاريعي على GitHub - يتم تحديثه تلقائياً</p>
    </div>
    
    <div id="projects" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <p class="text-center text-gray-500 col-span-3">جاري جلب المشاريع...</p>
    </div>
  </div>

<script>
const username = "uemurtaza1998";
const container = document.getElementById("projects");

fetch(`https://api.github.com/users/${username}/repos?sort=updated&per_page=100`)
  .then(res => res.json())
  .then(repos => {
    container.innerHTML = "";
    repos.forEach(repo => {
      if (repo.name === `${username}.github.io` || repo.fork) return;
      
      const card = `
        <div class="bg-[#161b22] border border-gray-800 rounded-xl p-4 hover:border-blue-500 transition">
          <img src="https://raw.githubusercontent.com/${username}/${repo.name}/main/preview.png" 
               onerror="this.src='https://placehold.co/600x400/161b22/58a6ff?text=${repo.name}'" 
               class="w-full h-40 object-cover rounded-lg mb-3">
          
          <h3 class="text-xl font-bold text-blue-400 mb-1">${repo.name}</h3>
          <p class="text-gray-400 text-sm mb-3 h-10">${repo.description || 'مشروع بدون وصف'}</p>
          
          <div class="flex gap-2 mb-4">
            <span class="text-xs bg-gray-800 px-2 py-1 rounded">${repo.language || 'Code'}</span>
            <span class="text-xs text-gray-500">★ ${repo.stargazers_count}</span>
          </div>

          <div class="flex gap-2">
            <a href="${repo.homepage || repo.html_url}" target="_blank" 
               class="flex-1 text-center bg-green-600 hover:bg-green-700 py-2 rounded-lg text-sm">عرض حي</a>
            <a href="${repo.html_url}" target="_blank" 
               class="flex-1 text-center bg-gray-700 hover:bg-gray-600 py-2 rounded-lg text-sm">الكود</a>
          </div>
        </div>
      `;
      container.innerHTML += card;
    });
  });
</script>
</body>
</html>
